<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dies_maintenance_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>dies_maintenance_frontend</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Container for spinner & glow */
    .spinner-container {
      position: relative;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer pulsing ring */
    .pulse-glow {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: rgba(5, 150, 105, 0.15);
      box-shadow: 0 0 15px 2px rgba(5, 150, 105, 0.3);
      animation: pulse 1.8s infinite ease-in-out;
    }

    /* Inner rotating spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3.5px solid rgba(5, 150, 105, 0.1);
      border-top: 3.5px solid #059669;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* Loading text */
    .loading-text {
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #1e293b;
      opacity: 0.8;
      animation: text-pulse 1.8s infinite ease-in-out;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.9);
        opacity: 0.2;
      }
      50% {
        transform: scale(1.25);
        opacity: 0.6;
      }
    }

    @keyframes text-pulse {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="spinner-container">
      <div class="pulse-glow"></div>
      <div class="spinner"></div>
    </div>
    <div class="loading-text">Dies Maintenance</div>
  </div>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
