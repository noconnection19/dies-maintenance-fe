name: dies_maintenance_frontend
description: "A new Flutter project for Dies Maintenance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  image_picker: ^1.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  dropdown_search: ^7.0.0
  month_picker_dialog: ^6.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/LogoNTC.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
